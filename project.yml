name: ZmanApp
options:
  bundleIdPrefix: com.zmanapp
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  ZmanApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ZmanApp
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: ZmanApp/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zmanapp.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: false
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_NAME: Zman
    dependencies:
      - target: ZmanWidgets
        embed: true

  ZmanWidgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ZmanWidgets
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: ZmanWidgets/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zmanapp.app.widgets
        ASSETCATALOG_COMPILER_WIDGET_BACKGROUND_COLOR_NAME: WidgetBackground
        TARGETED_DEVICE_FAMILY: "1,2"
        PRODUCT_NAME: ZmanWidgets

schemes:
  ZmanApp:
    build:
      targets:
        ZmanApp: all
        ZmanWidgets: all
    run:
      config: Debug
    archive:
      config: Release
